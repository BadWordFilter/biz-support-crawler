name: Daily Auto Crawling

on:
  schedule:
    # 매 6시간마다 실행 (UTC 기준 0, 6, 12, 18시 -> 한국 시간 9, 15, 21, 03시)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 수동으로도 실행 가능하도록 설정

# git push 권한 부여 (exit code 128 오류 해결)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4  # v3 → v4 (Node.js 20 deprecated 경고 해결)
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5  # v4 → v5 (Node.js 20 deprecated 경고 해결)
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Crawler
      run: python crawler.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add scripts/data.js
        git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update announcements data" && git push)
